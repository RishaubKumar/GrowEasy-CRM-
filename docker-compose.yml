version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - GEMINI_MODEL=gemini-3.5-flash
      - NODE_ENV=production

  frontend:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
